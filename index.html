<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI AR - Advanced Cyber HUD</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 250px; height: 250px;
        border: 2px dashed #00ffff;
        border-radius: 50%; /* Tarama alanı da yuvarlak ve teknolojik */
        box-shadow: 0 0 30px #00ffff;
        animation: spin 4s linear infinite;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity position="0 0 0.1">
          
          <a-ring radius-inner="0.48" radius-outer="0.5" material="color: #00ffff; transparent: true; opacity: 0.6; shader: flat" animation="property: rotation; to: 0 0 360; loop: true; dur: 15000; easing: linear"></a-ring>
          
          <a-ring radius-inner="0.42" radius-outer="0.45" theta-length="280" material="color: #00ffff; transparent: true; opacity: 0.8; shader: flat" animation="property: rotation; to: 0 0 -360; loop: true; dur: 10000; easing: linear"></a-ring>
          
          <a-ring radius-inner="0.38" radius-outer="0.39" theta-length="150" material="color: #bc13fe; transparent: true; opacity: 0.8; shader: flat" animation="property: rotation; to: 0 0 360; loop: true; dur: 8000; easing: linear"></a-ring>

          <a-dodecahedron radius="0.25" material="color: #00ffff; transparent: true; opacity: 0.3; wireframe: true" animation="property: rotation; to: 360 360 0; loop: true; dur: 25000; easing: linear"></a-dodecahedron>
          
          <a-dodecahedron radius="0.18" material="color: #bc13fe; transparent: true; opacity: 0.5; wireframe: true" animation="property: rotation; to: -360 -360 0; loop: true; dur: 20000; easing: linear"></a-dodecahedron>

          <a-entity position="0 0 0.15">
            <a-plane width="0.25" height="0.15" material="color: #000022; transparent: true; opacity: 0.9; shader: flat"></a-plane>
            <a-ring radius-inner="0.13" radius-outer="0.14" theta-length="360" material="color: #00ffff; shader: flat"></a-ring>
            <a-text value="AI" color="#00ffff" align="center" position="0 0 0.01" scale="1.5 1.5 1.5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" animation="property: opacity; from: 0.5; to: 1; dir: alternate; loop: true; dur: 1000"></a-text>
          </a-entity>

          <a-cylinder position="-0.25 0 0" radius="0.003" height="0.3" rotation="0 0 90" material="color: #00ffff; shader: flat"></a-cylinder>
          <a-cylinder position="0.25 0 0" radius="0.003" height="0.3" rotation="0 0 90" material="color: #00ffff; shader: flat"></a-cylinder>
          <a-cylinder position="0 -0.25 0" radius="0.003" height="0.3" rotation="90 0 0" material="color: #bc13fe; shader: flat"></a-cylinder>

          <a-light type="point" color="#00ffff" intensity="2" position="0 0 0.5"></a-light>
          
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');

      target.addEventListener('targetFound', () => {
        overlay.style.display = 'none';
        video.play();
      });

      target.addEventListener('targetLost', () => {
        overlay.style.display = 'flex';
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
