<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI AR - Test</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 260px; height: 260px;
        border: 3px solid #00ffff;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffff;
      }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="hologram-group">
          <a-text value="AI" color="#ffffff" align="center" position="0 0.2 0" scale="1.5 1.5 1.5"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            animation="property: scale; to: 1.7 1.7 1.7; dir: alternate; loop: true; dur: 1000">
          </a-text>

          <a-torus radius="0.4" radius-tubular="0.01" rotation="90 0 0" material="color: #00ffff; transparent: true; opacity: 0.6;"></a-torus>
          <a-light type="point" color="#00ffff" intensity="2"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');

      target.addEventListener('targetFound', () => {
        overlay.style.display = 'none';
        video.play();
      });

      target.addEventListener('targetLost', () => {
        overlay.style.display = 'flex';
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
