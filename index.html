<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI - Siyah Hologram</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
      /* Arka planı tamamen siyah yapmak için */
      body { margin: 0; background-color: #000000; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene vr-mode-ui="enabled: false" embedded>
      
      <a-sky color="#000000"></a-sky>

      <a-camera position="0 0 2.5" look-controls="enabled: false"></a-camera>

      <a-entity id="brain-hologram" position="0 0 0" rotation="0 180 0" 
                animation="property: rotation; to: 0 -180 0; loop: true; dur: 20000; easing: linear">
        
        <a-sphere position="-0.15 0 0" radius="0.35" scale="1 1.3 1.6" material="color: #00ffff; transparent: true; opacity: 0.3; wireframe: true;"></a-sphere>
        <a-sphere position="0.15 0 0" radius="0.35" scale="1 1.3 1.6" material="color: #bc13fe; transparent: true; opacity: 0.3; wireframe: true;"></a-sphere>
        
        <a-sphere position="-0.1 0.1 0" radius="0.1" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
        <a-sphere position="0.1 0.1 0" radius="0.1" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
        
        <a-entity position="0 0 0.1">
          <a-box width="0.2" height="0.2" depth="0.05" material="color: #00ffff; opacity: 0.8; shader: standard;"></a-box>
          <a-text value="AI" 
            color="#ffffff" 
            align="center" 
            position="0 0 0.03" 
            scale="2 2 2"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            animation="property: opacity; from: 0.6; to: 1; dir: alternate; dur: 800; loop: true">
          </a-text>
        </a-entity>

        <a-entity rotation="90 0 0">
          <a-torus radius="0.6" radius-tubular="0.005" material="color: #00ffff; opacity: 0.5;"
            animation="property: rotation; to: 0 0 360; loop: true; dur: 5000; easing: linear">
          </a-torus>
          <a-torus radius="0.5" radius-tubular="0.005" material="color: #bc13fe; opacity: 0.4;"
            animation="property: rotation; to: 0 0 -360; loop: true; dur: 8000; easing: linear">
          </a-torus>
        </a-entity>

        <a-cylinder position="0 0 0" radius="0.003" height="1" material="color: #00ffff; shader: flat;"></a-cylinder>
        <a-cylinder position="0.12 0 0" radius="0.003" height="0.8" material="color: #bc13fe; shader: flat;"></a-cylinder>
        <a-cylinder position="-0.12 0 0" radius="0.003" height="0.8" material="color: #bc13fe; shader: flat;"></a-cylinder>

        <a-light type="point" color="#00ffff" intensity="2" position="0 0 0.5"></a-light>
        <a-light type="point" color="#bc13fe" intensity="1.5" position="0 -0.5 0.5"></a-light>
      </a-entity>
      
    </a-scene>
  </body>
</html>
