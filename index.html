<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AR Projesi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Ortadaki hedef karesi */
      #scanning-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 250px;
        height: 250px;
        border: 4px dashed rgba(255, 255, 255, 0.7);
        border-radius: 15px;
        box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3); /* Etrafı hafif karartır, ortayı vurgular */
      }
      /* Yükleme halkasını gizle */
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">
      <div class="target-box"></div>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-video src="#aiVideo" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');

      target.addEventListener('targetFound', () => {
        overlay.style.display = 'none'; // Bulunca kareyi gizle
        video.play();
      });

      target.addEventListener('targetLost', () => {
        overlay.style.display = 'flex'; // Kaybedince kareyi geri getir
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play();
        video.pause(); 
      }, {once: true});
    </script>
  </body>
</html>
