<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI AR - Eilik Robot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Ortadaki hedef karesi */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 260px; height: 260px;
        border: 4px solid #00ffff;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffff;
        animation: pulse 2s infinite;
      }
      @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="robot-group" rotation="0 180 0">
          
          <a-sphere position="0 0.4 0" radius="0.12" material="color: #ffffff; transparent: true; opacity: 0.6;">
            <a-cylinder position="0 0 0.08" radius="0.08" height="0.1" rotation="90 0 0" material="color: #000000; transparent: true; opacity: 0.9;">
              <a-torus position="-0.03 0.02 0.04" radius="0.02" radius-tubular="0.005" rotation="90 0 0" material="color: #00ffff; shader: flat;"></a-torus>
              <a-torus position="0.03 0.02 0.04" radius="0.02" radius-tubular="0.005" rotation="90 0 0" material="color: #00ffff; shader: flat;"></a-torus>
              <a-cylinder id="robot-mouth" position="0 -0.04 0.04" radius="0.01" height="0.005" rotation="90 0 0" material="color: #00ffff; shader: flat;"></a-cylinder>
            </a-cylinder>
          </a-sphere>
          
          <a-sphere position="0 0.15 0" radius="0.15" scale="1 1.2 1" material="color: #00cccc; transparent: true; opacity: 0.5;">
            <a-torus position="0 0 0.05" radius="0.13" radius-tubular="0.005" rotation="0 0 0" material="color: #ffffff; transparent: true; opacity: 0.4;"></a-torus>
          </a-sphere>

          <a-cylinder position="0 -0.1 0" radius="0.2" height="0.02" material="color: #ffffff; transparent: true; opacity: 0.7; wireframe: true;"></a-cylinder>

          <a-light type="point" color="#00ffff" intensity="2" position="0 0.5 0.5"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const mouth = document.querySelector('#robot-mouth'); // Ağız objesi

      target.addEventListener('targetFound', () => {
        document.querySelector('#scanning-overlay').style.display = 'none';
        video.play(); 
        
        // Ses algılayıp ağzı oynatma (Sensör komutu)
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          const audioContext = new AudioContext();
          const source = audioContext.createMediaStreamSource(stream);
          const analyser = audioContext.createAnalyser();
          source.connect(analyser);
          
          const bufferLength = analyser.frequencyBinCount;
          const dataArray = new Uint8Array(bufferLength);
          
          function updateMouth() {
            analyser.getByteFrequencyData(dataArray);
            const volume = dataArray.reduce((a, b) => a + b, 0) / bufferLength; // Ses şiddetini hesapla
            
            // Ses şiddetine göre ağız yüksekliğini ayarla
            const mouthHeight = Math.max(0.005, volume / 10); 
            mouth.setAttribute('scale', `1 ${mouthHeight} 1`);
            
            requestAnimationFrame(updateMouth);
          }
          
          updateMouth();
        }).catch(err => console.error(err));
      });

      target.addEventListener('targetLost', () => {
        document.querySelector('#scanning-overlay').style.display = 'flex';
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
