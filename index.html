<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI - Konuşan Robot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Ortadaki hedef karesi */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 260px; height: 260px;
        border: 4px solid #00ffff;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffff;
        animation: pulse 2s infinite;
      }
      @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="robot-face" position="0 0 0.1" rotation="0 0 0">
          
          <a-box width="0.5" height="0.5" depth="0.2" material="color: #ffffff; shader: standard; roughness: 0.3; metalness: 0.1;"></a-box>
          
          <a-plane width="0.45" height="0.45" position="0 0 0.101" material="color: #000000; shader: standard;"></a-plane>
          
          <a-circle radius="0.06" color="#00ffff" position="-0.1 0.08 0.102" material="shader: flat;"></a-circle>
          <a-circle radius="0.06" color="#00ffff" position="0.1 0.08 0.102" material="shader: flat;"></a-circle>
          
          <a-cylinder id="robot-mouth" position="0 -0.12 0.102" radius="0.006" height="0.03" rotation="90 0 0" material="color: #00ffff; shader: flat;"></a-cylinder>

          <a-light type="point" color="#00ffff" intensity="1.5" position="0 0.5 0.5"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const mouth = document.querySelector('#robot-mouth'); // Ağız objesi

      target.addEventListener('targetFound', () => {
        document.querySelector('#scanning-overlay').style.display = 'none';
        video.play(); 
        
        // Ses Analiz Edici (Ağız Oynatma İçin)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(video);
        const analyser = audioCtx.createAnalyser();
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        function updateMouth() {
          analyser.getByteFrequencyData(dataArray);
          const volume = dataArray.reduce((a, b) => a + b, 0) / bufferLength; // Ses şiddetini hesapla
          
          // Ses şiddetine göre ağız yüksekliğini ayarla
          const mouthScale = 1 + (volume / 10); 
          mouth.setAttribute('scale', `1 ${mouthScale} 1`);
          
          requestAnimationFrame(updateMouth);
        }
        updateMouth();
      });

      target.addEventListener('targetLost', () => {
        document.querySelector('#scanning-overlay').style.display = 'flex';
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
