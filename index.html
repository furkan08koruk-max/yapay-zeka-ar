<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI - Konuşan Robot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 250px; height: 250px;
        border: 4px solid #00ffff;
        border-radius: 20px;
      }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="robot-face" position="0 0 0.1" rotation="0 0 0">
          
          <a-box width="0.5" height="0.5" depth="0.2" material="color: #ffffff;"></a-box>
          
          <a-plane width="0.45" height="0.45" position="0 0 0.101" material="color: #000000;"></a-plane>
          
          <a-circle radius="0.06" color="#00ffff" position="-0.1 0.08 0.102" material="shader: flat;"></a-circle>
          <a-circle radius="0.06" color="#00ffff" position="0.1 0.08 0.102" material="shader: flat;"></a-circle>
          
          <a-box id="robot-mouth" width="0.2" height="0.03" depth="0.01" position="0 -0.12 0.102" material="color: #00ffff; shader: flat;"></a-box>

          <a-light type="point" color="#00ffff" intensity="1.5" position="0 0 0.5"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const mouth = document.querySelector('#robot-mouth');

      target.addEventListener('targetFound', () => {
        document.querySelector('#scanning-overlay').style.display = 'none';
        video.play();
        
        // Ses Analiz Başlangıcı
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(video);
        const analyser = audioCtx.createAnalyser();
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function animate() {
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for(let i=0; i<40; i++) sum += dataArray[i];
          let vol = sum / 40;
          
          // Ağız dikeyde ses şiddetine göre büyür
          let s = 1 + (vol / 8);
          mouth.setAttribute('scale', `1 ${s} 1`);
          requestAnimationFrame(animate);
        }
        animate();
      });

      target.addEventListener('targetLost', () => {
        document.querySelector('#scanning-overlay').style.display = 'flex';
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
