<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Hologram Projesi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 250px; height: 250px;
        border: 4px dashed rgba(0, 150, 255, 0.7); /* AI teması için mavi yaptık */
        border-radius: 15px;
      }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">
      <div class="target-box"></div>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline></video>
        <a-asset-item id="aiModel" src="ai_brain.glb"></a-asset-item> 
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#aiVideo" width="1" height="0.56" position="0 0 0" visible="true"></a-video>
        
        <a-gltf-model id="hologram-obj" src="#aiModel" 
          position="0 0 0.2" 
          scale="0.5 0.5 0.5" 
          visible="false"
          material="transparent: true; opacity: 0.6;" 
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-gltf-model>
      </a-entity>
      
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const videoObj = document.querySelector('#video-obj');
      const hologramObj = document.querySelector('#hologram-obj');
      const target = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');

      target.addEventListener('targetFound', () => {
        overlay.style.display = 'none';
        video.play();
      });

      target.addEventListener('targetLost', () => {
        overlay.style.display = 'flex';
        video.pause();
      });

      // VİDEO BİTTİĞİNDE BURASI ÇALIŞIR
      video.addEventListener('ended', () => {
        videoObj.setAttribute('visible', 'false'); // Videoyu gizle
        hologramObj.setAttribute('visible', 'true'); // Hologramı göster
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause(); 
      }, {once: true});
    </script>
  </body>
</html>
