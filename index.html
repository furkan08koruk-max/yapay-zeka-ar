<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI AR - Brain Cyber</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 250px; height: 250px;
        border: 4px solid #00ffff;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffff;
      }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="brain-core">
          
          <a-sphere radius="0.35" material="color: #00ffff; transparent: true; opacity: 0.2; wireframe: true;"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
          </a-sphere>
          
          <a-sphere radius="0.3" material="color: #bc13fe; transparent: true; opacity: 0.3; wireframe: true;"
            animation="property: rotation; to: 0 -360 0; loop: true; dur: 10000; easing: linear">
          </a-sphere>

          <a-box width="0.15" height="0.15" depth="0.05" material="color: #00ffff; opacity: 0.8;" position="0 0 0">
            <a-text value="AI" color="#ffffff" align="center" position="0 0 0.03" scale="1.5 1.5 1.5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
          </a-box>

          <a-entity rotation="90 0 0">
            <a-torus radius="0.5" radius-tubular="0.005" material="color: #00ffff; opacity: 0.5;"
              animation="property: rotation; to: 0 0 360; loop: true; dur: 4000; easing: linear">
            </a-torus>
            <a-torus radius="0.45" radius-tubular="0.005" material="color: #bc13fe; opacity: 0.4;"
              animation="property: rotation; to: 0 0 -360; loop: true; dur: 6000; easing: linear">
            </a-torus>
          </a-entity>

          <a-cylinder position="0 0 0" radius="0.002" height="0.8" material="color: #00ffff; opacity: 0.6;"></a-cylinder>
          <a-cylinder position="0.1 0 0" radius="0.002" height="0.6" material="color: #bc13fe; opacity: 0.4;"></a-cylinder>
          <a-cylinder position="-0.1 0 0" radius="0.002" height="0.6" material="color: #bc13fe; opacity: 0.4;"></a-cylinder>

          <a-light type="point" color="#00ffff" intensity="2" position="0 0 0.5"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');

      target.addEventListener('targetFound', () => {
        document.querySelector('#scanning-overlay').style.display = 'none';
        video.play();
      });

      target.addEventListener('targetLost', () => {
        document.querySelector('#scanning-overlay').style.display = 'flex';
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
