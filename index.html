<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI - Brain Hologram</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 250px; height: 250px;
        border: 4px solid #00ffff;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffff;
      }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="brain-group" animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true">
          
          <a-sphere position="-0.1 0 0" radius="0.2" scale="1 1.2 1.5" material="color: #00ffff; transparent: true; opacity: 0.3; wireframe: true;"></a-sphere>
          <a-sphere position="0.1 0 0" radius="0.2" scale="1 1.2 1.5" material="color: #00ffff; transparent: true; opacity: 0.3; wireframe: true;"></a-sphere>
          
          <a-sphere radius="0.15" material="color: #00ffff; transparent: true; opacity: 0.1; shader: flat;"></a-sphere>

          <a-text value="AI" position="0 0 0.05" align="center" color="#ffffff" width="3" font="exo2bold" shader="flat" animation="property: opacity; from: 0.5; to: 1; dir: alternate; dur: 1000; loop: true"></a-text>
          
        </a-entity>

        <a-torus radius="0.4" radius-tubular="0.005" rotation="90 0 0" material="color: #00ffff; transparent: true; opacity: 0.4;"></a-torus>
        <a-torus radius="0.5" radius-tubular="0.005" rotation="90 45 0" material="color: #00ffff; transparent: true; opacity: 0.2;"></a-torus>

        <a-light type="point" color="#00ffff" intensity="2" position="0 0 0"></a-light>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');

      target.addEventListener('targetFound', () => {
        document.querySelector('#scanning-overlay').style.display = 'none';
        video.play();
      });

      target.addEventListener('targetLost', () => {
        document.querySelector('#scanning-overlay').style.display = 'flex';
        video.pause();
      });

      // Video sesi ve dokunma etkileşimi için genel klik
      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
