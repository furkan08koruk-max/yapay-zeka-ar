<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI - Brain Hologram</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Ortadaki hedef karesi */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 260px; height: 260px;
        border: 4px solid #00ffff;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffff;
        animation: pulse 2s infinite;
      }
      @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="brain-group" position="0 0 0.1" rotation="0 0 0">
          
          <a-sphere position="-0.1 0 0" radius="0.22" scale="1 1.2 1.5" material="color: #00ffff; transparent: true; opacity: 0.4; wireframe: true;"></a-sphere>
          <a-sphere position="0.1 0 0" radius="0.22" scale="1 1.2 1.5" material="color: #00ffff; transparent: true; opacity: 0.4; wireframe: true;"></a-sphere>
          
          <a-sphere position="-0.08 0.1 0" radius="0.08" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
          <a-sphere position="0.08 0.1 0" radius="0.08" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
          <a-sphere position="-0.08 -0.1 0" radius="0.08" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
          <a-sphere position="0.08 -0.1 0" radius="0.08" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
          
          <a-cylinder position="-0.1 0 0" radius="0.003" height="0.4" rotation="0 0 90" material="color: #00ffff; shader: flat;"></a-cylinder>
          <a-cylinder position="0.1 0 0" radius="0.003" height="0.4" rotation="0 0 90" material="color: #00ffff; shader: flat;"></a-cylinder>
          <a-cylinder position="0 0.1 0" radius="0.003" height="0.4" rotation="90 0 0" material="color: #00ffff; shader: flat;"></a-cylinder>
          <a-cylinder position="0 -0.1 0" radius="0.003" height="0.4" rotation="90 0 0" material="color: #00ffff; shader: flat;"></a-cylinder>

          <a-text value="AI" 
            color="#ffffff" 
            align="center" 
            position="0 0 0.15" 
            scale="1.5 1.5 1.5"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            animation="property: opacity; from: 0.5; to: 1; dir: alternate; dur: 1000; loop: true">
          </a-text>

          <a-light type="point" color="#00ffff" intensity="1.5" position="0 0.5 0.5"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');

      target.addEventListener('targetFound', () => {
        document.querySelector('#scanning-overlay').style.display = 'none';
        video.play(); 
      });

      target.addEventListener('targetLost', () => {
        document.querySelector('#scanning-overlay').style.display = 'flex';
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
