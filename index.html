<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI AR - Robot Hologramı</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Ortadaki hedef karesi */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; pointer-events: none;
      }
      .target-box {
        width: 250px; height: 250px;
        border: 3px dashed #00ffff;
        border-radius: 15px;
        box-shadow: 0 0 15px #00ffff;
      }
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay"><div class="target-box"></div></div>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-entity id="hologram-group" rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          
          <a-sphere position="0 0.35 0" radius="0.1" material="color: #00ffff; transparent: true; opacity: 0.7; wireframe: true;"></a-sphere>
          
          <a-sphere position="-0.04 0.38 0.08" radius="0.02" material="color: #ffffff; shader: flat;"></a-sphere>
          <a-sphere position="0.04 0.38 0.08" radius="0.02" material="color: #ffffff; shader: flat;"></a-sphere>
          
          <a-box position="0 0.15 0" width="0.2" height="0.3" depth="0.1" material="color: #00ffff; transparent: true; opacity: 0.5; wireframe: true;"></a-box>
          
          <a-cylinder position="-0.15 0.2 0" radius="0.02" height="0.2" rotation="0 0 30" material="color: #00ffff; transparent: true; opacity: 0.6; wireframe: true;"></a-cylinder>
          <a-cylinder position="0.15 0.2 0" radius="0.02" height="0.2" rotation="0 0 -30" material="color: #00ffff; transparent: true; opacity: 0.6; wireframe: true;"></a-cylinder>
          
          <a-cylinder position="-0.06 -0.1 0" radius="0.02" height="0.2" material="color: #00ffff; transparent: true; opacity: 0.6; wireframe: true;"></a-cylinder>
          <a-cylinder position="0.06 -0.1 0" radius="0.02" height="0.2" material="color: #00ffff; transparent: true; opacity: 0.6; wireframe: true;"></a-cylinder>

          <a-torus-knot radius="0.3" radius-tubular="0.005" p="2" q="3"
            material="color: #ffffff; transparent: true; opacity: 0.3; wireframe: true;"
            animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; loop: true; dur: 1000">
          </a-torus-knot>

          <a-text value="AI" color="#ffffff" align="center" position="0 0.15 0.06" scale="0.8 0.8 0.8"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
          </a-text>

          <a-light type="point" color="#00ffff" intensity="2" position="0 0.5 0.5"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');

      // Görseli görünce robotu (sesi) başlat
      target.addEventListener('targetFound', () => {
        overlay.style.display = 'none';
        video.play(); 
      });

      // Görsel kaybolunca durdur
      target.addEventListener('targetLost', () => {
        overlay.style.display = 'flex';
        video.pause();
      });

      // İlk tıklamada tarayıcıyı uyandır
      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
