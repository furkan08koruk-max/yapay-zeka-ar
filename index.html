<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AR Projesi - Furkan</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#aiVideo" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      // Video kontrolü için küçük bir script
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('[mindar-image-target]');

      target.addEventListener('targetFound', event => {
        video.play();
      });

      target.addEventListener('targetLost', event => {
        video.pause();
      });
    </script>
  </body>
</html>
