<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furkan AI AR - Cyberpunk Brain</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Normal MindAR tarama UI'ını geri getirmek için */
      body { margin: 0; background-color: #000000; overflow: hidden; }
      /* MindAR'ın kendi tarama ekranını göster */
      .mindar-ui-scanning { display: block !important; }
      /* Yükleme ekranını gizle */
      .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: targets%20(1).mind; uiLoading: no; uiScanning: yes;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="aiVideo" src="yzvideo.mp4" preload="auto" crossorigin="anonymous" playsinline loop="true"></video>
        <img id="cyberpunk-bg" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.0/examples/image-tracking/assets/band-example/bg.jpg" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        
        <a-sky id="background-sky" src="#cyberpunk-bg" material="color: #bc13fe; transparent: true; opacity: 0;"></a-sky>

        <a-entity id="brain-group" position="0 0 0.1" rotation="0 180 0" 
                  animation="property: rotation; to: 0 -180 0; loop: true; dur: 20000; easing: linear">
          
          <a-sphere position="-0.12 0 0" radius="0.3" scale="1 1.2 1.5" material="color: #00ffff; transparent: true; opacity: 0.3; wireframe: true;"></a-sphere>
          <a-sphere position="0.12 0 0" radius="0.3" scale="1 1.2 1.5" material="color: #bc13fe; transparent: true; opacity: 0.3; wireframe: true;"></a-sphere>
          
          <a-sphere position="-0.1 0.1 0" radius="0.1" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
          <a-sphere position="0.1 0.1 0" radius="0.1" material="color: #ffffff; shader: standard; roughness: 0.3;"></a-sphere>
          
          <a-entity position="0 0 0.1">
            <a-box width="0.2" height="0.2" depth="0.05" material="color: #00ffff; opacity: 0.8; shader: standard;"></a-box>
            <a-text value="AI" 
              color="#ffffff" 
              align="center" 
              position="0 0 0.03" 
              scale="2 2 2"
              font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
              animation="property: opacity; from: 0.6; to: 1; dir: alternate; dur: 800; loop: true">
            </a-text>
          </a-entity>

          <a-entity rotation="90 0 0">
            <a-torus radius="0.5" radius-tubular="0.005" material="color: #00ffff; opacity: 0.5;"
              animation="property: rotation; to: 0 0 360; loop: true; dur: 5000; easing: linear">
            </a-torus>
          </a-entity>

          <a-light type="point" color="#00ffff" intensity="2" position="0 0 0.5"></a-light>
          <a-light type="point" color="#bc13fe" intensity="1.5" position="0 -0.5 0.5"></a-light>
        </a-entity>
        
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#aiVideo');
      const target = document.querySelector('#target-anchor');
      const sky = document.querySelector('#background-sky');

      target.addEventListener('targetFound', () => {
        // Görsel bulunduğunda arka planın şeffaflığını kaldırıp cyberpunk görselini gösterir
        sky.setAttribute('material', 'opacity: 1');
        video.play(); 
      });

      target.addEventListener('targetLost', () => {
        // Görsel kaybolduğunda arka planı tekrar şeffaf yapar
        sky.setAttribute('material', 'opacity: 0');
        video.pause();
      });

      document.body.addEventListener('click', () => {
        video.play(); video.pause();
      }, {once: true});
    </script>
  </body>
</html>
